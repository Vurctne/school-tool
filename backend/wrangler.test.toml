name = "sft-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "sft"
database_id = "test-db-id"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "sft-assets"

[[queues.producers]]
binding = "OCR_QUEUE"
queue = "sft-ocr"

[vars]
PRICING_CENTS_SUBTOTAL = 55000
GST_RATE = "0.10"
PRICING_CENTS_TOTAL = 60500
PRODUCT_NAME = "School Tool"
SELLER_NAME = "ZXW Investment Pty Ltd"
SELLER_ABN_TBD = "true"
SUPPORT_EMAIL = "Vurctne@gmail.com"
LICENCE_DAYS = 365
