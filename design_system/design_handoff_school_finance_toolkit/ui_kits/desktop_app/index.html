<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Desktop UI kit · Master Budget Automation Tool</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f0eee9;font-family:'Segoe UI',Inter,system-ui,sans-serif;color:#1A1D21;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="windows-chrome.jsx"></script>
<script type="text/babel" src="mb-app.jsx"></script>
<script type="text/babel">
  const W = 900, H = 760;

  function Frame({ state }) {
    return (
      <WindowsWindow width={W} height={H}>
        <MasterBudgetApp stateName={state} />
      </WindowsWindow>
    );
  }

  function Root() {
    return (
      <DesignCanvas>
        <DCSection id="states" title="Master Budget Automation Tool — states" subtitle="Tkinter app recreated (app.py) — idle, running, success, warning, error">
          <DCArtboard id="idle"    label="1 · Idle — waiting to run"          width={W} height={H}><Frame state="idle" /></DCArtboard>
          <DCArtboard id="running" label="2 · Running — 42% writing Master"   width={W} height={H}><Frame state="running" /></DCArtboard>
          <DCArtboard id="success" label="3 · Success — no mismatches"        width={W} height={H}><Frame state="success" /></DCArtboard>
          <DCArtboard id="warning" label="4 · Warning — 3 mismatch items"     width={W} height={H}><Frame state="warning" /></DCArtboard>
          <DCArtboard id="error"   label="5 · Error — output equals template" width={W} height={H}><Frame state="error" /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
